<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error | Ondrobit E-Shop</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }
        
        .error-container {
            text-align: center;
            padding: 4rem 3rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
        }
        
        .error-icon {
            font-size: 5.5rem;
            color: #ef4444; /* Danger/Error Red */
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        
        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .error-message {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-size: 1.05rem;
        }
        
        .btn-home {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid var(--primary-color);
        }
        
        .btn-home:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-muted);
            border: 2px solid #cbd5e1;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-left: 10px;
        }
        
        .btn-outline:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
            border-color: #94a3b8;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 576px) {
            .error-container { padding: 3rem 1.5rem; }
            .error-code { font-size: 5rem; }
            .btn-outline { margin-left: 0; margin-top: 15px; }
            .btn-home, .btn-outline { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <!-- Server Error Icon -->
        <i class="fas fa-server error-icon"></i>
        
        <div class="error-code">404</div>
        <h1 class="error-title"> Error</h1>
        
        <p class="error-message">
            Oops! Something went wrong on our end. Our engineering team has been notified and is working to resolve the issue as quickly as possible.
        </p>
        
        <!-- Action Buttons -->
        <div>
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> Go to Homepage
            </a>
            <a href="javascript:window.location.reload();" class="btn-outline">
                <i class="fas fa-sync-alt"></i> Try Again
            </a>
        </div>
    </div>

</body>
</html>
